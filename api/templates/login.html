<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>تسجيل الدخول | RADAR</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        * { font-family: 'Tajawal', 'Geist', sans-serif; }
        body { background-color: #0d1515; color: #dce4e4; overflow: hidden; }
        .glass-card {
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .input-dark {
            background: rgba(13, 21, 21, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #dce4e4;
            transition: all 0.3s;
        }
        .input-dark:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            border: 1px solid rgba(0, 242, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        .radar-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: conic-gradient(from 0deg, rgba(0, 242, 255, 0.1) 0deg, transparent 90deg);
            border-radius: 50%;
            animation: rotate-slow 10s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="radar-bg"></div>
    <div class="radar-bg" style="width: 500px; height: 500px; opacity: 0.5;"></div>

    <div class="glass-card w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-in fade-in zoom-in duration-500">
        <!-- الشعار -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container/10 border border-primary-container/30 mb-4 shadow-[0_0_15px_rgba(0,242,255,0.2)]">
                <span class="material-symbols-outlined text-primary-container text-4xl">settings_input_antenna</span>
            </div>
            <h1 class="text-3xl font-black text-primary drop-shadow-[0_0_10px_rgba(0,242,255,0.4)] tracking-tighter">RADAR</h1>
            <p class="text-on-surface-variant text-sm mt-2">نظام الاكتشاف الاجتماعي</p>
        </div>

        <!-- الرسائل -->
        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-500/10 border border-red-500/30 p-3 rounded-xl text-red-400 text-xs font-bold mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">error</span>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- النموذج -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] px-1">رقم الهاتف أو المستخدم</label>
                <div class="relative">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant"><span class="material-symbols-outlined text-lg">person</span></span>
                    <input type="text" name="phone" required dir="ltr"
                           class="input-dark w-full rounded-xl pr-12 pl-4 py-3.5 text-base">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] px-1">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant"><span class="material-symbols-outlined text-lg">lock</span></span>
                    <input type="password" name="password" required
                           class="input-dark w-full rounded-xl pr-12 pl-4 py-3.5 text-base">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-primary-container text-on-primary font-bold rounded-xl neon-glow hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                دخول <span class="material-symbols-outlined">arrow_back</span>
            </button>
        </form>

        <div class="mt-8 text-center space-y-4">
            <p class="text-sm text-on-surface-variant">
                ليس لديك حساب؟
                <a href="{% url 'register-page' %}" class="text-primary-container hover:underline font-bold">سجل الآن</a>
            </p>
            <a href="{% url 'reset-password-page' %}" class="block text-xs text-on-surface-variant/60 hover:text-primary-container">نسيت كلمة المرور؟</a>
        </div>
    </div>
</body>
</html>
