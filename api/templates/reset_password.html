<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>إعادة تعيين كلمة السر | RADAR</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        * { font-family: 'Tajawal', 'Geist', sans-serif; }
        body { background-color: #0d1515; color: #dce4e4; overflow: hidden; }
        .glass-card {
            background: rgba(26, 26, 36, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .input-dark {
            background: rgba(13, 21, 21, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #dce4e4;
            transition: all 0.3s;
        }
        .input-dark:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-card w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-in fade-in zoom-in duration-500">
        <!-- الشعار -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500/10 border border-amber-500/30 mb-4 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                <span class="material-symbols-outlined text-amber-500 text-4xl">key</span>
            </div>
            <h1 class="text-2xl font-black text-amber-500 tracking-tighter">إعادة تعيين</h1>
            <p class="text-on-surface-variant text-sm mt-2">استعد الوصول إلى حسابك</p>
        </div>

        <!-- الرسائل -->
        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-500/10 border border-red-500/30 p-3 rounded-xl text-red-400 text-xs font-bold mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">error</span>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- النموذج -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] px-1">رقم الهاتف</label>
                <input type="tel" name="phone" required dir="ltr"
                       class="input-dark w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] px-1">كلمة المرور الجديدة</label>
                <input type="password" name="new_password" required
                       class="input-dark w-full rounded-xl px-4 py-3 text-base">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em] px-1">تأكيد الكلمة</label>
                <input type="password" name="new_password_confirm" required
                       class="input-dark w-full rounded-xl px-4 py-3 text-base">
            </div>

            <button type="submit" class="w-full py-4 bg-amber-500 text-on-primary font-bold rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.3)] hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                تحديث كلمة السر <span class="material-symbols-outlined">sync</span>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'login-page' %}" class="text-sm text-on-surface-variant hover:text-primary-container">العودة لتسجيل الدخول</a>
        </div>
    </div>
</body>
</html>
